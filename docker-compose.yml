services:
  btc-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: btc-dashboard
    ports:
      - "34000:80"
    volumes:
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
