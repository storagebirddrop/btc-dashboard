# Shared security + caching headers macro
map $sent_http_content_type $csp_header {
    default "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.coingecko.com; img-src 'self' data:; frame-ancestors 'none';";
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 256;

    # ── Security headers (applied in every location block to avoid inheritance gap) ──
    add_header X-Frame-Options          "DENY"                               always;
    add_header X-Content-Type-Options   "nosniff"                            always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.coingecko.com; img-src 'self' data:; frame-ancestors 'none';" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options          "DENY"                               always;
        add_header X-Content-Type-Options   "nosniff"                            always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"    always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.coingecko.com; img-src 'self' data:; frame-ancestors 'none';" always;
    }

    # Immutable cache for hashed assets — security headers must be repeated here
    # because nginx does NOT inherit add_header from parent blocks when a child
    # location defines its own add_header directives.
    location ~* \.(js|css|woff2|woff|ttf|svg|ico|png)$ {
        expires 1y;
        add_header Cache-Control            "public, immutable"                  always;
        add_header X-Content-Type-Options   "nosniff"                            always;
        add_header X-Frame-Options          "DENY"                               always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
        try_files $uri =404;
    }
}
