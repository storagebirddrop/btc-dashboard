server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 256;

    # ── Security headers ──────────────────────────────────────────────────────
    # Repeated in each location block — nginx does not inherit add_header from
    # parent blocks when a child location defines its own add_header directives.
    add_header X-Frame-Options          "DENY"                               always;
    add_header X-Content-Type-Options   "nosniff"                            always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.coingecko.com; img-src 'self' data:; frame-ancestors 'none';" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options          "DENY"                               always;
        add_header X-Content-Type-Options   "nosniff"                            always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"    always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.coingecko.com; img-src 'self' data:; frame-ancestors 'none';" always;
    }

    # Immutable cache for hashed assets
    location ~* \.(js|css|woff2|woff|ttf|svg|ico|png)$ {
        expires 1y;
        add_header Cache-Control            "public, immutable"                  always;
        add_header X-Content-Type-Options   "nosniff"                            always;
        add_header X-Frame-Options          "DENY"                               always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
        try_files $uri =404;
    }
}
